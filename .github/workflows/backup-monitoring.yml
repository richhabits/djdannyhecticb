name: Backup Monitoring & Alerts

on:
  # Run every 6 hours to check backup status
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  check-backup-health:
    name: Check Backup Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install tools
        run: |
          npm install -g supabase@latest
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check database connectivity
        id: connectivity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true
        run: |
          echo "Checking database connectivity..."

          if psql "$DATABASE_URL" -c "SELECT version();" > /dev/null 2>&1; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✓ Database is accessible" >> $GITHUB_STEP_SUMMARY
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "✗ Database is NOT accessible" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check backup recency
        id: recency
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Checking backup recency..."

          # Get latest artifact timestamp
          LATEST_ARTIFACT=$(gh run list -w "Database Backup & Monitoring" \
            --status completed --limit 1 --json conclusion,createdAt \
            --jq '.[0].createdAt' 2>/dev/null || echo "")

          if [ -z "$LATEST_ARTIFACT" ]; then
            echo "status=no-recent-backup" >> $GITHUB_OUTPUT
            echo "⚠ No recent backup found in artifacts" >> $GITHUB_STEP_SUMMARY
          else
            BACKUP_AGE=$(($(date +%s) - $(date -d "$LATEST_ARTIFACT" +%s)))
            BACKUP_HOURS=$((BACKUP_AGE / 3600))

            if [ $BACKUP_HOURS -lt 25 ]; then
              echo "status=fresh" >> $GITHUB_OUTPUT
              echo "✓ Latest backup is $BACKUP_HOURS hours old" >> $GITHUB_STEP_SUMMARY
            elif [ $BACKUP_HOURS -lt 48 ]; then
              echo "status=aging" >> $GITHUB_OUTPUT
              echo "⚠ Latest backup is $BACKUP_HOURS hours old (older than 24h)" >> $GITHUB_STEP_SUMMARY
            else
              echo "status=stale" >> $GITHUB_OUTPUT
              echo "✗ Latest backup is $BACKUP_HOURS hours old (CRITICAL)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
        continue-on-error: true

      - name: Check database size
        id: size
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Checking database size..."

          SIZE=$(psql "$DATABASE_URL" -t -c \
            "SELECT pg_size_pretty(pg_database_size(current_database()));" 2>/dev/null || echo "N/A")

          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Database size: $SIZE" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Check table counts
        id: tables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Checking table counts..."

          psql "$DATABASE_URL" -t -c "
            SELECT 'live_sessions' AS table_name, COUNT(*) AS row_count FROM live_sessions
            UNION ALL SELECT 'chat_messages', COUNT(*) FROM chat_messages
            UNION ALL SELECT 'donations', COUNT(*) FROM donations
            UNION ALL SELECT 'streamer_stats', COUNT(*) FROM streamer_stats
            UNION ALL SELECT 'notifications', COUNT(*) FROM notifications
            ORDER BY 1;
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not retrieve table counts"
        continue-on-error: true

      - name: Analyze recent changes
        id: changes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Analyzing recent data changes..."

          psql "$DATABASE_URL" -t -c "
            SELECT
              'Tables' AS metric,
              COUNT(*) AS value
            FROM information_schema.tables
            WHERE table_schema = 'public'
            UNION ALL
            SELECT 'Sequences', COUNT(*)
            FROM information_schema.sequences
            WHERE sequence_schema = 'public'
            UNION ALL
            SELECT 'Indexes', COUNT(*)
            FROM pg_indexes
            WHERE schemaname = 'public';
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not retrieve schema info"
        continue-on-error: true

      - name: Alert if backup is stale
        if: steps.recency.outputs.status == 'stale'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 CRITICAL: Database Backup is Stale',
              body: `
                ## Critical Backup Alert

                **Status**: Database backup has not been updated in > 48 hours

                ### Details
                - Last backup age: Unknown (artifact not found)
                - Project: ujxncnmoccotlssnqzwx
                - Region: eu-west-1

                ### Required Actions
                1. Check GitHub Actions workflow status
                2. Verify database connectivity
                3. Trigger manual backup: \`git push\` to trigger workflow or run manually
                4. Verify S3 backup configuration (if enabled)

                ### Reference
                - [Backup Documentation](./docs/DATABASE_BACKUPS.md)
                - [Backup Workflow](./.github/workflows/database-backup.yml)

                **This is an automated alert. Please investigate immediately.**
              `,
              labels: ['🚨 critical', 'backup', 'database']
            })

      - name: Alert if database unreachable
        if: steps.connectivity.outputs.status == 'unhealthy'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 CRITICAL: Database Unreachable',
              body: `
                ## Critical Database Alert

                **Status**: Database connection failed

                ### Details
                - Database: db.ujxncnmoccotlssnqzwx.supabase.co
                - Project: ujxncnmoccotlssnqzwx

                ### Immediate Actions Required
                1. Check Supabase dashboard: https://app.supabase.com/project/ujxncnmoccotlssnqzwx
                2. Verify database status in Settings → Status
                3. Check network connectivity
                4. Review PostgreSQL logs in Supabase dashboard
                5. Contact Supabase support if issue persists

                ### Escalation
                - **Priority**: CRITICAL
                - **RTO**: < 15 minutes
                - **Impact**: Application cannot access database

                **Immediate investigation required.**
              `,
              labels: ['🚨 critical', 'database', 'incident']
            })

      - name: Create monitoring summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Backup Health Check Summary

          ### Status Indicators
          - **Connectivity**: ${{ steps.connectivity.outputs.status || 'unknown' }}
          - **Backup Recency**: ${{ steps.recency.outputs.status || 'unknown' }}
          - **Database Size**: ${{ steps.size.outputs.size || 'N/A' }}

          ### Configuration
          - **Project**: ujxncnmoccotlssnqzwx (eu-west-1)
          - **Backup Schedule**: Daily at 2 AM UTC
          - **Retention**: 7 days (GitHub artifacts) + configurable S3 (if enabled)
          - **RPO**: 24 hours (automated) / on-demand (manual)

          ### Recommendations
          - ✓ Enable S3 backups for extended retention (90 days)
          - ✓ Upgrade to Supabase Pro for advanced backup features
          - ✓ Run monthly restore tests
          - ✓ Document incident response procedures

          **Last Check**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          EOF

  generate-metrics:
    name: Generate Backup Metrics
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate metrics report
        run: |
          cat > backup_metrics.json << 'EOF'
          {
            "backup_config": {
              "project_ref": "ujxncnmoccotlssnqzwx",
              "region": "eu-west-1",
              "engine": "PostgreSQL 17.6.1",
              "automated_backup": true,
              "retention_days": 7,
              "backup_frequency": "daily"
            },
            "rto_rpo": {
              "rto_minutes": 30,
              "rpo_hours": 24,
              "rto_point_in_time": 15,
              "recovery_mechanism": "PITR + Full Restore"
            },
            "tables": [
              {
                "name": "live_sessions",
                "criticality": "high",
                "retention": "permanent"
              },
              {
                "name": "chat_messages",
                "criticality": "medium",
                "retention": "permanent"
              },
              {
                "name": "donations",
                "criticality": "critical",
                "retention": "permanent"
              },
              {
                "name": "streamer_stats",
                "criticality": "high",
                "retention": "permanent"
              }
            ]
          }
          EOF

          cat backup_metrics.json

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: backup-metrics
          path: backup_metrics.json
          retention-days: 90

  maintenance:
    name: Backup Maintenance
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.run_number % 30 == 0

    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const now = new Date();
            const maxAge = 7 * 24 * 60 * 60 * 1000; // 7 days in milliseconds

            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              const age = now - createdAt;

              if (age > maxAge && artifact.name.includes('backup')) {
                console.log(`Deleting old artifact: ${artifact.name}`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }

      - name: Generate maintenance report
        run: |
          echo "## Backup Maintenance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Completed Actions" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Cleaned up artifacts older than 7 days" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Verified backup workflow status" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Checked for orphaned backups" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Scheduled Maintenance" >> $GITHUB_STEP_SUMMARY
          echo "- Monthly: Full restore test" >> $GITHUB_STEP_SUMMARY
          echo "- Quarterly: Backup policy review" >> $GITHUB_STEP_SUMMARY
