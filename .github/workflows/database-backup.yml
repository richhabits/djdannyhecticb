name: Database Backup & Monitoring

on:
  schedule:
    # Run daily backup at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - schema-only
          - validate

permissions:
  contents: write
  actions: write

jobs:
  backup:
    name: Create Database Backup
    runs-on: ubuntu-latest

    env:
      PROJECT_REF: ujxncnmoccotlssnqzwx
      BACKUP_DIR: .backups

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install -g supabase@latest
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup directory
        run: mkdir -p ${{ env.BACKUP_DIR }}

      - name: Create full database backup
        if: github.event_name == 'schedule' || github.event.inputs.backup_type == 'full'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="${{ env.BACKUP_DIR }}/backup_${TIMESTAMP}.sql"

          echo "Creating backup: $BACKUP_FILE"

          pg_dump "$DATABASE_URL" --format=plain > "$BACKUP_FILE"

          # Get backup statistics
          SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
          LINES=$(wc -l < "$BACKUP_FILE")

          echo "Backup Statistics:" >> $GITHUB_STEP_SUMMARY
          echo "- File: $BACKUP_FILE" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Lines: $LINES" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $TIMESTAMP" >> $GITHUB_STEP_SUMMARY

          # Compress backup
          echo "Compressing backup..."
          gzip "$BACKUP_FILE"
          COMPRESSED_SIZE=$(du -h "$BACKUP_FILE.gz" | cut -f1)
          echo "- Compressed Size: $COMPRESSED_SIZE" >> $GITHUB_STEP_SUMMARY

          # Store metadata
          echo "timestamp=$(date +%s)" > "$BACKUP_FILE.gz.meta"
          echo "size_uncompressed=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || echo 'N/A')" >> "$BACKUP_FILE.gz.meta"

      - name: Create schema-only backup
        if: github.event.inputs.backup_type == 'schema-only'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="${{ env.BACKUP_DIR }}/backup_schema_${TIMESTAMP}.sql"

          echo "Creating schema-only backup: $BACKUP_FILE"
          pg_dump "$DATABASE_URL" --schema-only --format=plain > "$BACKUP_FILE"

          SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
          gzip "$BACKUP_FILE"

          echo "Schema-only backup created: $SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Validate backup integrity
        run: |
          echo "Validating backup files..."

          for backup_file in ${{ env.BACKUP_DIR }}/backup_*.sql.gz; do
            if [ -f "$backup_file" ]; then
              echo "Testing: $backup_file"

              # Test gzip integrity
              if gzip -t "$backup_file"; then
                echo "✓ Gzip integrity verified"
              else
                echo "✗ Gzip file corrupted: $backup_file"
                exit 1
              fi

              # Check file size
              SIZE=$(du -h "$backup_file" | cut -f1)
              echo "  Size: $SIZE"
              echo "  Valid: ✓" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check backup freshness
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Checking database connectivity..."

          # Test connection
          psql "$DATABASE_URL" -c "SELECT version();" > /dev/null

          # Get database size
          SIZE=$(psql "$DATABASE_URL" -t -c "SELECT pg_size_pretty(pg_database_size(current_database()));")

          # Get table count
          TABLES=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';")

          echo "Database Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- Tables: $TABLES" >> $GITHUB_STEP_SUMMARY

      - name: Upload backup to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: database-backups
          path: ${{ env.BACKUP_DIR }}/backup_*.sql.gz
          retention-days: 7

      - name: Create GitHub Release (weekly)
        if: github.event_name == 'schedule' && github.run_number % 7 == 0
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: backup-${{ github.run_number }}
          release_name: Database Backup ${{ github.run_number }}
          draft: false
          prerelease: true

      - name: Upload to S3 (if configured)
        if: secrets.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Check if AWS credentials are configured
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "AWS credentials not configured, skipping S3 upload"
            exit 0
          fi

          S3_BUCKET="${{ secrets.AWS_S3_BUCKET_NAME }}"
          if [ -z "$S3_BUCKET" ]; then
            echo "S3 bucket name not configured"
            exit 0
          fi

          echo "Uploading backups to S3..."

          for backup_file in ${{ env.BACKUP_DIR }}/backup_*.sql.gz; do
            if [ -f "$backup_file" ]; then
              FILENAME=$(basename "$backup_file")
              S3_KEY="database/backups/$FILENAME"

              aws s3 cp "$backup_file" "s3://$S3_BUCKET/$S3_KEY" \
                --sse AES256 \
                --acl private \
                --metadata "timestamp=$(date +%s),project=djdannyhecticb"

              echo "Uploaded: s3://$S3_BUCKET/$S3_KEY" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Database backup failed! Check workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

      - name: Clean up old backups
        run: |
          echo "Cleaning up backups older than 7 days..."
          find ${{ env.BACKUP_DIR }} -name "backup_*.sql.gz" -mtime +7 -delete
          echo "Cleanup complete"

  test-restore:
    name: Test Restore Procedure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.run_number % 30 == 0)
    needs: backup

    env:
      PROJECT_REF: ujxncnmoccotlssnqzwx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g supabase@latest
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: database-backups
          path: .backups

      - name: Test restore procedure
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Test database URL not configured, skipping restore test"
            exit 0
          fi

          echo "Testing restore procedure..."

          # Get latest backup
          BACKUP_FILE=$(ls -t .backups/backup_*.sql.gz | head -1)

          if [ -z "$BACKUP_FILE" ]; then
            echo "No backup found"
            exit 1
          fi

          echo "Decompressing backup..."
          gunzip -k "$BACKUP_FILE"
          DECOMPRESSED="${BACKUP_FILE%.gz}"

          # Test restore (with timeout)
          echo "Testing restore on test database..."
          timeout 300 psql "$DATABASE_URL" < "$DECOMPRESSED" > /dev/null 2>&1 && \
            echo "✓ Restore test passed" || echo "⚠ Restore test inconclusive (test DB may not exist)"

          # Cleanup
          rm -f "$DECOMPRESSED"

      - name: Verify restore data integrity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            exit 0
          fi

          echo "Running data integrity checks..."

          # Check table counts
          psql "$DATABASE_URL" -t -c "
            SELECT 'live_sessions' AS table_name, COUNT(*) FROM live_sessions
            UNION ALL
            SELECT 'chat_messages', COUNT(*) FROM chat_messages
            UNION ALL
            SELECT 'donations', COUNT(*) FROM donations
            ORDER BY 1;
          " || echo "Integrity check skipped"

  monitor-backups:
    name: Monitor Backup Status
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Check backup status
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Supabase token not configured"
            exit 0
          fi

          echo "Checking backup status..."

          # Note: Backup status check via Supabase API would go here
          # This is a placeholder for future API integration

          echo "Backup monitoring complete" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [backup]

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.backup.result }}" = "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "color=28a745" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "color=dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Notify via GitHub
        run: |
          echo "## Backup Status: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Create workflow summary
        run: |
          echo "# Database Backup Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Project: ujxncnmoccotlssnqzwx" >> $GITHUB_STEP_SUMMARY
          echo "- Region: eu-west-1" >> $GITHUB_STEP_SUMMARY
          echo "- Schedule: Daily at 2 AM UTC" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 7 days (artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Review [DATABASE_BACKUPS.md](./docs/DATABASE_BACKUPS.md)" >> $GITHUB_STEP_SUMMARY
          echo "- Run restore test: \`./scripts/backup-test.sh --full\`" >> $GITHUB_STEP_SUMMARY
          echo "- Check S3 backups (if configured)" >> $GITHUB_STEP_SUMMARY
