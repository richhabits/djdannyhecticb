services:
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_METRICS_URL=ws://localhost:8000/ws/metrics
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - LIQUIDSOAP_HOST=liquidsoap
      - LIQUIDSOAP_PORT=8005
    depends_on:
      - liquidsoap

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    ports:
      - "8005:8005"
    # Placeholder for actual liquidsoap script
    command: >
      liquidsoap 'output.dummy(blank())'
