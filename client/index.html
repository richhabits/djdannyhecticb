<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="description" content="DJ Danny Hectic B - 30+ years of UK Garage, House, Jungle, Grime. Book for clubs, private events, corporate, or radio. Clean DBS, USA Visa approved." />
    <meta name="keywords" content="DJ Danny Hectic B, DJ booking, London DJ, electronic music, Garage, House, Jungle, Grime, Hectic Radio" />
    <meta name="author" content="DJ Danny Hectic B / Hectic Radio" />
    <meta name="copyright" content="Copyright (c) 2024 DJ Danny Hectic B / Hectic Radio. All rights reserved." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />

    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DJ Danny Hectic B - 30+ Years UK Underground" />
    <meta property="og:description" content="Book Danny for clubs, private events, corporate gigs. 30+ years in Garage, House, Jungle, Grime. Clean DBS. Available UK & International." />
    <meta property="og:url" content="https://djdannyhecticb.com" />
    <meta property="og:image" content="https://djdannyhecticb.com/og-image.png" />
    <meta property="og:site_name" content="DJ Danny Hectic B" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DJ Danny Hectic B - 30+ Years UK Underground" />
    <meta name="twitter:description" content="Book Danny for clubs, private events, corporate gigs. 30+ years in Garage, House, Jungle, Grime." />
    <meta name="twitter:image" content="https://djdannyhecticb.com/og-image.png" />

    <!-- Canonical and Alternative -->
    <link rel="canonical" href="https://djdannyhecticb.com" />
    <link rel="alternate" type="application/rss+xml" title="DJ Danny Hectic B - Updates" href="/feed.xml" />

    <!-- Icons and App Meta -->
    <link rel="icon" type="image/png" href="%VITE_APP_LOGO%" />
    <link rel="apple-touch-icon" href="/logo-danny-hectic-b.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DJ Danny" />

    <!-- PWA and Mobile Optimizations -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="DJ Danny Hectic B" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="msapplication-TileColor" content="#0A0A0A" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

    <title>%VITE_APP_TITLE%</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics script - conditionally loaded via main.tsx to avoid dev mode issues -->

    <!-- Prevent zoom on double-tap in iOS -->
    <script>
      document.addEventListener('touchstart', function() {}, { passive: true });
      document.addEventListener('touchmove', function() {}, { passive: true });
      document.addEventListener('touchend', function() {}, { passive: true });
    </script>
  </body>

</html>
